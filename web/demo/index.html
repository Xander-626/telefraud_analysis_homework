<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeleAntiFraud 电诈检测演示工作台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23126d7a'/%3E%3Cpath d='M8 3l4 2v3c0 2.4-1.5 4-4 5-2.5-1-4-2.6-4-5V5l4-2z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Deep Learning Course Demo</p>
          <h1>TeleAntiFraud 电诈检测演示工作台</h1>
        </div>
        <div class="model-pill">Whisper-small ASR + Chinese RoBERTa + MLP</div>
      </header>

      <section class="workspace" aria-label="电诈检测工作台">
        <section class="input-panel" aria-label="输入区">
          <div class="tabs" role="tablist" aria-label="输入方式">
            <button class="tab-button active" type="button" data-tab="samples">预置样例</button>
            <button class="tab-button" type="button" data-tab="upload">上传检测</button>
            <button class="tab-button" type="button" data-tab="text">文本检测</button>
          </div>

          <div class="tab-pane active" id="samples-pane">
            <div id="sample-list" class="sample-list" aria-live="polite"></div>
          </div>

          <div class="tab-pane" id="upload-pane">
            <label class="upload-box" for="audio-file">
              <span class="upload-title">选择通话音频</span>
              <span class="upload-hint">支持 mp3 / wav；答辩主路径优先使用预置样例</span>
              <input id="audio-file" type="file" accept=".mp3,.wav,audio/mpeg,audio/wav">
            </label>
            <p id="upload-name" class="subtle">未选择文件</p>
            <button id="upload-detect" class="primary-button" type="button">检测上传音频</button>
          </div>

          <div class="tab-pane" id="text-pane">
            <label class="field-label" for="text-input">通话文本或 ASR 转写</label>
            <textarea id="text-input" rows="8" placeholder="例如：请马上转账到安全账户，否则银行卡会被冻结"></textarea>
            <button id="text-detect" class="primary-button" type="button">检测文本</button>
          </div>
        </section>

        <section id="result-panel" class="result-panel" aria-live="polite">
          <div class="result-empty">
            <p class="eyebrow">Model Flow</p>
            <h2>音频与文本融合检测</h2>
            <div class="flow-row">
              <span>音频输入</span>
              <span>Whisper-small</span>
              <span>RoBERTa</span>
              <span>MLP 融合分类</span>
              <span>normal / fraud</span>
            </div>
          </div>
        </section>
      </section>

    </main>

    <script src="/app.js"></script>
  </body>
</html>
